<!DOCTYPE html>
<html lang="ru" data-bs-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Bot Admin{% endblock %}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link href="/static/css/style.css" rel="stylesheet">
</head>
<body>
  <nav class="navbar navbar-expand-lg navbar-dark bg-dark border-bottom border-secondary">
    <div class="container-fluid">
      <a class="navbar-brand fw-bold" href="/"><i class="bi bi-robot me-2"></i>Bot Admin</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarNav">
        <div class="navbar-nav ms-auto align-items-center">
          <a class="nav-link {% if request.url.path == '/' %}active{% endif %}" href="/">
            <i class="bi bi-speedometer2 me-1"></i>Dashboard
          </a>
          <a class="nav-link {% if '/keywords' in request.url.path %}active{% endif %}" href="/keywords">
            <i class="bi bi-key me-1"></i>Keywords
          </a>
          <a class="nav-link {% if '/users' in request.url.path %}active{% endif %}" href="/users">
            <i class="bi bi-people me-1"></i>Users
          </a>
          <a class="nav-link {% if '/broadcast' in request.url.path %}active{% endif %}" href="/broadcast">
            <i class="bi bi-megaphone me-1"></i>Broadcast
          </a>
          <a class="nav-link {% if '/logs' in request.url.path %}active{% endif %}" href="/logs">
            <i class="bi bi-journal-text me-1"></i>Logs
          </a>
          <div class="vr ms-2 me-2 d-none d-lg-block" style="opacity:0.3"></div>
          <a class="nav-link text-danger" href="/logout">
            <i class="bi bi-box-arrow-right me-1"></i>Logout
          </a>
        </div>
      </div>
    </div>
  </nav>

  <div class="container-fluid py-4 px-4">
    {% if flash %}
    <div class="alert alert-{{ flash.type }} alert-dismissible fade show" role="alert">
      <i class="bi bi-{% if flash.type == 'success' %}check-circle{% elif flash.type == 'danger' %}exclamation-triangle{% else %}info-circle{% endif %} me-2"></i>
      {{ flash.message }}
      <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
    {% endif %}
    {% block content %}{% endblock %}
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="/static/js/main.js"></script>
  {% block scripts %}{% endblock %}
</body>
</html>
