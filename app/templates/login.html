<!DOCTYPE html>
<html lang="ru" data-bs-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Вход — Bot Admin</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link href="/static/css/style.css" rel="stylesheet">
  <style>
    body {
      background: #0d1117;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .login-card {
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 12px;
      padding: 2.5rem;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.4);
    }
    .login-logo {
      font-size: 3rem;
      color: #58a6ff;
      display: block;
      text-align: center;
      margin-bottom: 0.5rem;
    }
    .login-title {
      text-align: center;
      font-weight: 700;
      font-size: 1.5rem;
      color: #e6edf3;
      margin-bottom: 0.25rem;
    }
    .login-subtitle {
      text-align: center;
      color: #8b949e;
      font-size: 0.9rem;
      margin-bottom: 2rem;
    }
    .form-control {
      background: #0d1117;
      border: 1px solid #30363d;
      color: #e6edf3;
    }
    .form-control:focus {
      background: #0d1117;
      border-color: #58a6ff;
      color: #e6edf3;
      box-shadow: 0 0 0 3px rgba(88,166,255,0.15);
    }
    .form-label {
      color: #8b949e;
      font-size: 0.875rem;
      font-weight: 500;
    }
    .btn-login {
      background: #238636;
      border: 1px solid #2ea043;
      color: #fff;
      font-weight: 600;
      padding: 0.6rem;
      transition: background 0.2s;
    }
    .btn-login:hover {
      background: #2ea043;
      color: #fff;
    }
  </style>
</head>
<body>
  <div class="login-card">
    <i class="bi bi-robot login-logo"></i>
    <h1 class="login-title">Bot Admin</h1>
    <p class="login-subtitle">Панель управления ботом</p>

    {% if flash %}
    <div class="alert alert-{{ flash.type }} py-2 px-3 mb-3" role="alert">
      <i class="bi bi-exclamation-triangle me-1"></i>
      {{ flash.message }}
    </div>
    {% endif %}

    <form method="POST" action="/login">
      <div class="mb-3">
        <label for="username" class="form-label">Логин</label>
        <div class="input-group">
          <span class="input-group-text bg-dark border-secondary text-secondary">
            <i class="bi bi-person"></i>
          </span>
          <input
            type="text"
            class="form-control"
            id="username"
            name="username"
            placeholder="admin"
            autocomplete="username"
            required
            autofocus
          >
        </div>
      </div>
      <div class="mb-4">
        <label for="password" class="form-label">Пароль</label>
        <div class="input-group">
          <span class="input-group-text bg-dark border-secondary text-secondary">
            <i class="bi bi-lock"></i>
          </span>
          <input
            type="password"
            class="form-control"
            id="password"
            name="password"
            placeholder="••••••••"
            autocomplete="current-password"
            required
          >
        </div>
      </div>
      <button type="submit" class="btn btn-login w-100">
        <i class="bi bi-box-arrow-in-right me-2"></i>Войти
      </button>
    </form>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
