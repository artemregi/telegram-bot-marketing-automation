version: "3.9"
services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: botdb
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  bot:
    build: .
    command: python main_bot.py
    env_file: .env
    volumes:
      - filedata:/data/files
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  web:
    build: .
    command: python main_web.py
    env_file: .env
    ports:
      - "8000:8000"
    volumes:
      - filedata:/data/files
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

volumes:
  pgdata:
  filedata:
